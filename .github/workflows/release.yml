name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "minimax-cli-linux"
          cache-targets: false
      - name: Build
        run: cargo build --release --locked
      - name: Rename
        run: cp target/release/minimax minimax-linux-x86_64
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: |
            minimax-linux-x86_64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "minimax-cli-windows"
          cache-targets: false
      - name: Build
        run: cargo build --release --locked --target x86_64-pc-windows-msvc
      - name: Rename
        run: cp target/x86_64-pc-windows-msvc/release/minimax.exe minimax-windows-x86_64.exe
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: |
            minimax-windows-x86_64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "minimax-cli-macos"
          cache-targets: false
      - name: Build x86_64
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin
      - name: Rename x86_64
        run: cp target/x86_64-apple-darwin/release/minimax minimax-macos-x86_64
      - name: Build ARM64
        run: |
          rustup target add aarch64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/minimax minimax-macos-arm64
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: |
            minimax-macos-x86_64
            minimax-macos-arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
